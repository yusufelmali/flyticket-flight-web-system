<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlyTicket | Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #ecf0f1; color: #2c3e50; }
        
        .container { background: white; padding: 30px; border-radius: 12px; max-width: 1100px; margin: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h2, h3 { color: #2c3e50; }
        h2 { border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-bottom: 25px; margin-top: 0; }

        input, select, button { padding: 12px; border-radius: 6px; border: 1px solid #bdc3c7; font-size: 14px; outline: none; transition: border-color 0.3s; box-sizing: border-box; }
        input:focus, select:focus { border-color: #3498db; }
        
        button { background-color: #3498db; color: white; cursor: pointer; font-weight: bold; border: none; transition: all 0.2s; }
        button:hover { background-color: #2980b9; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .add-btn { background-color: #2ecc71; padding: 12px 25px; }
        .add-btn:hover { background-color: #27ae60; }
        .edit-btn { background-color: #f39c12; padding: 8px 15px; font-size: 13px; }
        .edit-btn:hover { background-color: #d35400; }
        .delete-btn { background-color: #e74c3c; padding: 8px 15px; font-size: 13px; margin-left: 5px; }
        .delete-btn:hover { background-color: #c0392b; }
        .cancel-btn { background-color: #95a5a6; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; margin-bottom: 30px; background-color: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        th, td { padding: 14px; border-bottom: 1px solid #ecf0f1; text-align: left; }
        th { background-color: #3498db; color: white; font-weight: 600; letter-spacing: 0.5px; }
        tr:hover { background-color: #f7f9fa; }
        
        .hidden { display: none !important; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f8f9fa; padding: 25px; border-radius: 10px; margin-bottom: 30px; border: 1px solid #e1e8ed; border-top: 4px solid #2ecc71; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 12px; color: #7f8c8d; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select { width: 100%; }
        
        .button-group { grid-column: 1 / -1; display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        
        /* Login screen specific tweaks */
        #loginSection { max-width: 400px; text-align: center; border-top: 4px solid #3498db; }
        #loginSection input { width: 100%; margin-bottom: 15px; }
        #loginSection button { width: 100%; padding: 12px; }
    </style>
</head>
<body>

    <div class="container" id="loginSection">
        <h2>Admin Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div class="container hidden" id="dashboardSection">
        <h2 id="formTitle">Flight Management</h2>
        
        <h3>Add New Flight</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Flight ID</label>
                <input type="text" id="newFlightId" placeholder="e.g. TK2002">
            </div>
            <div class="form-group">
                <label>From City</label>
                <select id="newFromCity"><option value="">Select Origin</option></select>
            </div>
            <div class="form-group">
                <label>To City</label>
                <select id="newToCity"><option value="">Select Destination</option></select>
            </div>
            <div class="form-group">
                <label>Departure Time</label>
                <input type="datetime-local" id="newDepTime">
            </div>
            <div class="form-group">
                <label>Arrival Time</label>
                <input type="datetime-local" id="newArrTime">
            </div>
            <div class="form-group">
                <label>Price (TRY)</label>
                <input type="number" id="newPrice" placeholder="e.g. 1500">
            </div>
            <div class="form-group">
                <label>Total Seats</label>
                <input type="number" id="newSeats" placeholder="e.g. 180">
            </div>
            
            <div class="button-group">
                <button class="add-btn" id="submitFormBtn" onclick="addFlight()">Create Flight</button>
                <button class="cancel-btn hidden" id="cancelEditBtn" onclick="resetForm()">Cancel</button>
            </div>
        </div>

        <h3>All Flights</h3>
        <table id="flightsTable">
            <tr><th>Flight ID</th><th>Route</th><th>Departure</th><th>Arrival</th><th>Price</th><th>Action</th></tr>
        </table>

        <h3>Sold Tickets</h3>
        <table id="ticketsTable">
            <tr><th>Ticket ID</th><th>Passenger Name</th><th>Email</th><th>Flight ID</th></tr>
        </table>
    </div>

    <script>
        let isEditMode = false;
        let flightsData = [];

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const res = await fetch('/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            if (res.ok) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                await loadAdminCities();
                loadDashboardData();
            } else {
                alert('Invalid Username or Password!');
            }
        }

        async function loadAdminCities() {
            const res = await fetch('/cities');
            const cities = await res.json();
            const fromSel = document.getElementById('newFromCity');
            const toSel = document.getElementById('newToCity');
            fromSel.innerHTML = '<option value="">Select Origin</option>';
            toSel.innerHTML = '<option value="">Select Destination</option>';
            cities.forEach(c => {
                fromSel.appendChild(new Option(c.city_name, c.city_id));
                toSel.appendChild(new Option(c.city_name, c.city_id));
            });
        }

        async function loadDashboardData() {
            const fRes = await fetch('/flights');
            flightsData = await fRes.json();
            const fTable = document.getElementById('flightsTable');
            fTable.innerHTML = '<tr><th>Flight ID</th><th>Route</th><th>Departure</th><th>Arrival</th><th>Price</th><th>Action</th></tr>';
            
            flightsData.forEach(f => {
                fTable.innerHTML += `
                    <tr>
                        <td style="font-weight: bold; color: #2c3e50;">${f.flight_id}</td>
                        <td>${f.from_city_name} -> ${f.to_city_name}</td>
                        <td>${new Date(f.departure_time).toLocaleString('en-GB')}</td>
                        <td>${new Date(f.arrival_time).toLocaleString('en-GB')}</td>
                        <td style="color: #e67e22; font-weight: bold;">${f.price} TRY</td>
                        <td>
                            <button class="edit-btn" onclick="startEdit('${f.flight_id}')">Edit</button>
                            <button class="delete-btn" onclick="deleteFlight('${f.flight_id}')">Delete</button>
                        </td>
                    </tr>`;
            });

            const tRes = await fetch('/admin/tickets');
            const tickets = await tRes.json();
            const tTable = document.getElementById('ticketsTable');
            tTable.innerHTML = '<tr><th>Ticket ID</th><th>Passenger Name</th><th>Email</th><th>Flight ID</th></tr>';
            tickets.forEach(t => {
                tTable.innerHTML += `<tr>
                    <td style="font-weight: bold; color: #2c3e50;">${t.ticket_id}</td>
                    <td>${t.passenger_name} ${t.passenger_surname}</td>
                    <td>${t.passenger_email}</td>
                    <td>${t.flight_id}</td>
                </tr>`;
            });
        }

        function startEdit(id) {
            const flight = flightsData.find(f => f.flight_id === id);
            if (!flight) return;

            isEditMode = true;
            document.getElementById('formTitle').textContent = `Update Flight: ${id}`;
            document.getElementById('newFlightId').value = flight.flight_id;
            document.getElementById('newFlightId').disabled = true;
            document.getElementById('newFromCity').value = flight.from_city;
            document.getElementById('newToCity').value = flight.to_city;
            
            const pad = (n) => String(n).padStart(2, '0');
            const dDep = new Date(flight.departure_time);
            const dArr = new Date(flight.arrival_time);
            
            document.getElementById('newDepTime').value = `${dDep.getFullYear()}-${pad(dDep.getMonth()+1)}-${pad(dDep.getDate())}T${pad(dDep.getHours())}:${pad(dDep.getMinutes())}`;
            document.getElementById('newArrTime').value = `${dArr.getFullYear()}-${pad(dArr.getMonth()+1)}-${pad(dArr.getDate())}T${pad(dArr.getHours())}:${pad(dArr.getMinutes())}`;
            
            document.getElementById('newPrice').value = flight.price;
            document.getElementById('newSeats').value = flight.seats_total;

            const submitBtn = document.getElementById('submitFormBtn');
            submitBtn.textContent = 'Update Flight';
            submitBtn.className = 'edit-btn';
            submitBtn.setAttribute('onclick', `updateFlight('${id}')`);
            
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            
            // Edit formuna yumuşak bir şekilde kaydır
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            isEditMode = false;
            document.getElementById('formTitle').textContent = 'Flight Management';
            document.getElementById('newFlightId').value = '';
            document.getElementById('newFlightId').disabled = false;
            document.getElementById('newFromCity').value = '';
            document.getElementById('newToCity').value = '';
            document.getElementById('newDepTime').value = '';
            document.getElementById('newArrTime').value = '';
            document.getElementById('newPrice').value = '';
            document.getElementById('newSeats').value = '';

            const submitBtn = document.getElementById('submitFormBtn');
            submitBtn.textContent = 'Create Flight';
            submitBtn.className = 'add-btn';
            submitBtn.setAttribute('onclick', 'addFlight()');

            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        async function updateFlight(id) {
            const from_city = document.getElementById('newFromCity').value;
            const to_city = document.getElementById('newToCity').value;
            const dep_time = document.getElementById('newDepTime').value;
            const arr_time = document.getElementById('newArrTime').value;
            const price = document.getElementById('newPrice').value;
            const seats = document.getElementById('newSeats').value;

            if (!from_city || !to_city || !dep_time || !arr_time || !price || !seats) {
                alert('Please fill all fields!');
                return;
            }

            const formatTime = (t) => t.replace('T', ' ') + (t.length === 16 ? ':00' : '');

            try {
                const res = await fetch(`/admin/flights/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        from_city,
                        to_city,
                        departure_time: formatTime(dep_time),
                        arrival_time: formatTime(arr_time),
                        price: parseFloat(price),
                        seats_total: parseInt(seats)
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    alert('Flight successfully updated!');
                    resetForm();
                    loadDashboardData();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) { console.error('Error updating flight:', error); }
        }

        async function addFlight() {
            const flight_id = document.getElementById('newFlightId').value;
            const from_city = document.getElementById('newFromCity').value;
            const to_city = document.getElementById('newToCity').value;
            const dep_time = document.getElementById('newDepTime').value;
            const arr_time = document.getElementById('newArrTime').value;
            const price = document.getElementById('newPrice').value;
            const seats = document.getElementById('newSeats').value;

            if (!flight_id || !from_city || !to_city || !dep_time || !arr_time || !price || !seats) {
                alert('Please fill all fields!');
                return;
            }

            const formatTime = (t) => t.replace('T', ' ') + ':00';

            try {
                const res = await fetch('/flights', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        flight_id,
                        from_city,
                        to_city,
                        departure_time: formatTime(dep_time),
                        arrival_time: formatTime(arr_time),
                        price: parseFloat(price),
                        seats_total: parseInt(seats)
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    alert('Flight successfully created!');
                    resetForm();
                    loadDashboardData();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) { console.error('Error adding flight:', error); }
        }

        async function deleteFlight(id) {
            if (confirm('Are you sure you want to delete this flight? All tickets for this flight will also be deleted!')) {
                const res = await fetch(`/admin/flights/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    alert('Flight Deleted!');
                    loadDashboardData();
                }
            }
        }
    </script>
</body>
</html>
